<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoControl</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-layout">
        <div class="auth-side">
            <div class="auth-side-inner">
                <div class="auth-page-logo">ImmoControl</div>
                <h1 class="auth-hero-title">Moderne Immobilienverwaltung für ein neues Zeitalter</h1>
                <p class="auth-hero-text">
                    Strukturiere Immobilien, Aufgaben, Dokumente und Teamarbeit in einer klaren, modernen Oberfläche.
                </p>
            </div>
        </div>

        <div class="auth-main">
            <main class="auth-page-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
