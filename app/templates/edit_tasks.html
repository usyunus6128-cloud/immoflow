{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Aufgabe bearbeiten</h1>
        <p>Bearbeite Titel, Priorität, Frist und Zuweisung.</p>
    </div>
    <a href="/buildings/{{ task.building.id }}" class="button secondary">Zurück</a>
</div>

<div class="card narrow glass-card">
    <form method="post" action="/tasks/{{ task.id }}/edit">
        <label for="title">Titel</label>
        <input id="title" type="text" name="title" value="{{ task.title }}" required>

        <label for="priority">Priorität</label>
        <select id="priority" name="priority" required>
            {% for item in task_priorities %}
                <option value="{{ item }}" {% if task.priority == item %}selected{% endif %}>{{ item|capitalize }}</option>
            {% endfor %}
        </select>

        <label for="note">Notiz</label>
        <textarea id="note" name="note" rows="5">{{ task.note or '' }}</textarea>

        <label for="due_date">Fälligkeitsdatum</label>
        <input id="due_date" type="date" name="due_date" value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">

        <label for="assigned_user_id">Zugewiesen an</label>
        <select id="assigned_user_id" name="assigned_user_id">
            <option value="">Niemand</option>
            {% for company_user in company_users %}
                {% if company_user.role != ROLE_READONLY %}
                <option value="{{ company_user.id }}" {% if task.assigned_user_id == company_user.id %}selected{% endif %}>
                    {{ company_user.username }} - {{ company_user.role }}
                </option>
                {% endif %}
            {% endfor %}
        </select>

        <button type="submit" class="button">Aufgabe speichern</button>
    </form>
</div>
{% endblock %}
