{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Dokument bearbeiten</h1>
        <p>Bearbeite Titel und Kategorie des Dokuments.</p>
    </div>
    <a href="/documents" class="button secondary">Zurück</a>
</div>

<div class="card narrow glass-card">
    <form method="post" action="/documents/{{ document.id }}/edit">
        <label for="title">Dokumenttitel</label>
        <input id="title" type="text" name="title" value="{{ document.title or '' }}">

        <label for="category">Kategorie</label>
        <select id="category" name="category" required>
            {% for item in document_categories %}
                <option value="{{ item }}" {% if document.category == item %}selected{% endif %}>{{ item }}</option>
            {% endfor %}
        </select>

        <button type="submit" class="button">Änderungen speichern</button>
    </form>
</div>
{% endblock %}
